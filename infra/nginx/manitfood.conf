server {
    listen 80;
    server_name manitfood.ru www.manitfood.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name manitfood.ru www.manitfood.ru;

    root /var/www/manitfood-landing/dist;
    index index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/manitfood.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manitfood.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/manitfood.ru/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|avif)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Try files / fallback for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
